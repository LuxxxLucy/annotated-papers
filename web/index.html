<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Annotated Papers</title>
    <link rel="stylesheet" href="shared/monospace-web.css">
    <link rel="stylesheet" href="app.css?v=6">
  </head>
  <body class="reader-app">
    <main class="gallery">
      <div id="gallery-toolbar" class="gallery-toolbar" hidden>
        <button id="add-paper" type="button">Add paper</button>
        <button id="edit-collection" type="button">Edit collection</button>
      </div>
      <h1 id="collection-title" class="gallery-title">Annotated Papers</h1>
      <p id="collection-desc" class="gallery-desc" hidden></p>
      <ul id="gallery-list" class="gallery-list"></ul>
      <p id="gallery-status" class="status" hidden></p>
    </main>

    <dialog id="paper-dialog" class="dialog">
      <form method="dialog" id="paper-form">
        <div class="dialog-head">
          <h2 id="paper-dialog-title">Add Paper</h2>
        </div>
        <div class="paper-fields">
          <label for="paper-slug">Slug</label>
          <input id="paper-slug" name="slug" autocomplete="off" required>
          <label for="paper-title-input">Title</label>
          <input id="paper-title-input" name="title" autocomplete="off" required>
          <label for="paper-subtitle-input">Subtitle</label>
          <input id="paper-subtitle-input" name="subtitle" autocomplete="off">
          <label for="paper-author-input">Author</label>
          <input id="paper-author-input" name="author" autocomplete="off">
          <label for="paper-year-input">Year</label>
          <input id="paper-year-input" name="year" autocomplete="off">
          <label for="paper-source-input">Source</label>
          <input id="paper-source-input" name="source" autocomplete="off">
          <label for="paper-intro-input">Intro</label>
          <textarea id="paper-intro-input" name="intro" rows="5"></textarea>
          <label for="paper-pdf-url-input">PDF link</label>
          <input id="paper-pdf-url-input" name="pdfUrl" type="url" autocomplete="off" required>
        </div>
        <div class="dialog-actions">
          <button class="text-button" value="cancel" type="submit">Cancel</button>
          <button id="save-paper" value="default" type="submit">Apply</button>
        </div>
      </form>
    </dialog>

    <dialog id="collection-dialog" class="dialog">
      <form method="dialog" id="collection-form">
        <div class="dialog-head">
          <h2>Collection</h2>
        </div>
        <div class="paper-fields">
          <label for="collection-title-input">Title</label>
          <input id="collection-title-input" name="title" autocomplete="off" required>
          <label for="collection-desc-input">Description</label>
          <textarea id="collection-desc-input" name="description" rows="4"></textarea>
        </div>
        <div class="dialog-actions">
          <button class="text-button" value="cancel" type="submit">Cancel</button>
          <button id="save-collection" value="default" type="submit">Apply</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="gallery.js?v=6"></script>
  </body>
</html>
